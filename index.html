<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0E1216">
  <meta name="description" content="问心阁 — 不问鬼神，只问本心。问签、今日历、梦释、心灯、静坐，一座安放心绪的小阁。">
  <meta property="og:title" content="问心阁 · 不问鬼神，只问本心">
  <meta property="og:description" content="一支签，一盏灯，一刻静坐。给心绪一个落脚处。">
  <meta name="format-detection" content="telephone=no, email=no, address=no">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.json">
  <title>问心阁 · 不问鬼神，只问本心</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="home">
<main>
  <section class="hero fade-up">
    <div class="brand">问心阁</div>
    <div class="motto">不问鬼神 · 只问本心</div>
    <div class="inkline"></div>
  </section>

  <section class="card fade-up">
    <div class="daily-quote" id="quote"></div>
  </section>

  <section class="grid fade-up">
    <a class="tile" href="qian.html"><span class="ico">☴</span><span class="name">问签</span><span class="hint">三十六问心签</span></a>
    <a class="tile" href="today.html"><span class="ico">☀</span><span class="name">今日</span><span class="hint">历法宜忌</span></a>
    <a class="tile" href="meng.html"><span class="ico">☾</span><span class="name">梦释</span><span class="hint">昨夜何梦</span></a>
    <a class="tile" href="deng.html"><span class="ico">🕯</span><span class="name">心灯</span><span class="hint">为牵挂的人</span></a>
    <a class="tile" href="xi.html"><span class="ico">◌</span><span class="name">静坐</span><span class="hint">三分钟息</span></a>
    <a class="tile" href="me.html"><span class="ico">◉</span><span class="name">我的</span><span class="hint">心光与记录</span></a>
  </section>

  <section class="card fade-up" id="checkin-card">
    <div class="card-title">每日一省</div>
    <p style="font-size:14px;color:var(--ink-2);margin-bottom:14px">
      到此一坐，问自己一句：今天，心安否？签到记心光 +3。
    </p>
    <button class="btn block" id="btn-checkin">今日一省 · 签到</button>
  </section>

  <section class="card fade-up">
    <div class="card-title">阁中三件事</div>
    <p style="font-size:14px;color:var(--ink-2)">
      <b style="color:var(--dai-deep)">一支签</b> —— 签文皆为本阁原创，不占吉凶祸福，只借诗句帮你把心事看清。<br>
      <b style="color:var(--dai-deep)">一盏灯</b> —— 为牵挂的人点一盏心灯，灯在墙上，人就在心上。<br>
      <b style="color:var(--dai-deep)">一刻静</b> —— 跟随呼吸静坐片刻，世界很吵，这里很静。
    </p>
  </section>
</main>

<script src="js/core.js"></script>
<script src="js/data.js"></script>
<script src="js/premium.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  /* 每日一语：按日期确定性轮换 */
  const q = QUOTES[WXG.daySeed('quote') % QUOTES.length];
  document.getElementById('quote').innerHTML =
    '「 ' + q.q + ' 」<span class="from">—— ' + q.f + '</span>';

  /* 签到 */
  const btn = document.getElementById('btn-checkin');
  const sync = () => {
    if (WXG.checkedInToday()) { btn.textContent = '今日已省 · 心安'; btn.disabled = true; }
  };
  sync();
  btn.addEventListener('click', () => { WXG.checkin(); sync(); });
});
</script>
</body>
</html>
